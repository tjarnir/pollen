name: Dagliga pollen-dátu

on:
  schedule:
    # CAMS forecast er klár umleið kl. 08-11 UTC. Vit koyra 10:00 UTC.
    - cron: "0 10 * * *"
  workflow_dispatch: {}   # loyv manuellum koyringum

permissions:
  contents: write

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Installera pakkar
        run: pip install "cdsapi>=0.7" xarray netcdf4 numpy

      - name: Heinta pollen-dátu
        env:
          CDSAPI_URL: https://ads.atmosphere.copernicus.eu/api
          CDSAPI_KEY: ${{ secrets.CDSAPI_KEY }}
        run: python scripts/fetch_pollen.py

      - name: Commit uppdatering
        run: |
          git config user.name "pollur-bot"
          git config user.email "bot@users.noreply.github.com"
          git add data/pollen.json data/history.json
          if git diff --staged --quiet; then
            echo "Eingin broyting"
          else
            git commit -m "Uppdatera pollen-dátu $(date -u +%Y-%m-%d)"
            git push
          fi
